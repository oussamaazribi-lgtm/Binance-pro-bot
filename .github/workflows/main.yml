name: Binance Square Precise Publisher

on:
  # استقبال الإشارة من Make.com لعمل تشغيل آلي
  repository_dispatch:
    types: [trigger_hourly_post]
  
  # السماح بالتشغيل اليدوي للتجربة من تبويب Actions
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      # نستخدم install لضمان تثبيت المكتبات حتى في غياب ملف lock
      run: npm install

    - name: Run Bot Script
      env:
        # تأكد أن هذه الأسماء تطابق ما وضعته في GitHub Secrets
        BINANCE_KEY: ${{ secrets.BINANCE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        NODE_ENV: production
      run: node bot.js
