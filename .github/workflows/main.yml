name: Binance Square Precise Publisher

on:
  # استقبال الإشارة من Make.com
  repository_dispatch:
    types: [trigger_hourly_post]
  
  # السماح بالتشغيل اليدوي للتجربة
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      # تم تغيير npm ci إلى npm install لتجاوز خطأ الـ lockfile
      run: npm install

    - name: Run Bot Script
      env:
        BINANCE_KEY: ${{ secrets.BINANCE_KEY }}
        GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        NODE_ENV: production
      run: node bot.js
