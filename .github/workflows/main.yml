name: Binance Square Precise Publisher

on:
  # استقبال الإشارة من Make.com
  repository_dispatch:
    types: [run-bot]  # قمت بتغييرها لتطابق ما وضعناه في Make
  
  # السماح بالتشغيل اليدوي للتجربة
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Bot Script
      env:
        BINANCE_KEY: ${{ secrets.BINANCE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        NODE_ENV: production
      run: node bot.js
